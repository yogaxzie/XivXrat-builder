name: Build XivXrat APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # JURUS SAKTI: Kita pake Action resmi buat handle Gradle tanpa wrapper lokal
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.0.2  # Kunci di versi ini biar gak bentrok sama Gradle 10

    - name: Build XivXrat APK
      # Kita langsung panggil 'gradle', bukan './gradlew' karena wrapper Master rusak
      run: gradle assembleRelease --stacktrace --warning-mode none

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XivXrat-Release
        path: app/build/outputs/apk/release/*.apk
