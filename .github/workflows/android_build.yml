name: Build XivXrat APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # Update ke v4 (Node 20 support)

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.0.2 # Kita paksa pake versi ini biar gak butuh wrapper lokal

    - name: Build with Gradle
      run: gradle assembleRelease --stacktrace

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # Update ke v4
      with:
        name: XivXrat-Release
        path: app/build/outputs/apk/release/*.apk
