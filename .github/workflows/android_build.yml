name: XivXrat Auto Builder
name: XivXrat Auto Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2 # INI AKAN MENDOWNLOAD GRADLE OTOMATIS

    - name: Build APK (Release Mode)
      run: gradle assembleDebug # Menggunakan perintah 'gradle' langsung, bukan './gradlew'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: XivXrat-APK
        path: app/build/outputs/apk/debug/app-debug.apk
