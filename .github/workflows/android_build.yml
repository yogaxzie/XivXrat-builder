name: Build XivXrat APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # Update ke v4 (Node 20 support)

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # Update ke v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Repair Gradle Wrapper and Build
      run: |
        gradle wrapper # Ini perintah buat bikin ulang file yang hilang
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # Update ke v4
      with:
        name: XivXrat-Release
        path: app/build/outputs/apk/release/*.apk
